{% extends "layout.html" %} {% block content %}
<h1>Edit Product</h1>

<form method="post">
  {% csrf_token %} 

  <div class="form-group">
    {% for field in form %}
    <div class="mb-3">
      {{ field.label_tag }} {{ field }} 
      {% if field.errors %}
      <div class="invalid-feedback d-block">{{ field.errors }}</div>
      {% endif %}
    </div>
    {% endfor %}
  </div>

  <button type="submit" class="btn btn-primary">Edit</button>
</form>

{% endblock %}
