{% if messages %}
{% for msg in messages %}
<div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
    <div id="toastBlock" class="toast align-items-center text-bg-{% if msg.tags == 'error' %}danger{% else %}success{% endif %} border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
        <div class="toast-body">
        {{ msg }}
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    </div>
</div>
{% endfor %}

{% block scripts %} 
<script>
    window.onload = () => {
        const toastBlock = document.getElementById('toastBlock')

        if (toastBlock) {
            const toastBootstrap = bootstrap.Toast.getOrCreateInstance(toastBlock)
            toastBootstrap.show()
        }
    }
</script>
{% endblock %}
{% endif %}
